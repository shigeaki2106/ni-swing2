name: MILLION NIGHTS

# ────────────────────────────────────────────────
#  JST = UTC+9 | PCが完全に切れていても届く通知系
#    朝  6:00 JST = 前日 21:00 UTC → 起床通知(地合い)
#    朝  7:00 JST = 前日 22:00 UTC → 一括審査の作戦カード
#    昼 11:50 JST = 当日 02:50 UTC → トリガー監視タイム(昼休み用)
#    夜 17:15 JST = 当日 08:15 UTC → 終値チェック&日誌タイム
#  ユニバース(universe.csv)はPC起動時に自動更新される
# ────────────────────────────────────────────────
on:
  schedule:
    - cron: '0 21 * * 0-4'    # 平日 朝  6:00 JST
    - cron: '0 22 * * 0-4'    # 平日 朝  7:00 JST
    - cron: '50 2 * * 1-5'    # 平日 昼 11:50 JST
    - cron: '15 8 * * 1-5'    # 平日 夜 17:15 JST
  workflow_dispatch:           # 手動実行(テスト用)
    inputs:
      mode:
        description: 'wake / card / noon / evening'
        required: false
        default: 'card'

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 標準ライブラリのみ使用のため pip install 不要(高速起動)
      - name: Run MILLION NIGHTS
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          MN_MODE: ${{ github.event.inputs.mode }}
        run: python million_nights_cloud.py
