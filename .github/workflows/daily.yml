name: Japan Stock Swing Notifications

# ────────────────────────────────────────────────
#  JST = UTC+9  |  平日3回 + 週末1回
#
#  平日(月〜金 JST):
#    朝  7:00 JST = 前日/当日 22:00 UTC  → cron 0 22 * * 0-4
#    昼 12:30 JST = 当日      03:30 UTC  → cron 30 3 * * 1-5
#    夜 20:00 JST = 当日      11:00 UTC  → cron 0 11 * * 1-5
#
#  週末(土・日 JST):
#    朝  8:00 JST = 前日      23:00 UTC  → cron 0 23 * * 5,6
# ────────────────────────────────────────────────
# 【停止中】通知は MILLION NIGHTS (million_nights.yml) に一本化したため、
# この旧通知(notify_daily.py の詳細カード)の定期実行は停止しました。
# 旧形式を一時的に出したいときだけ、GitHubのActionsタブから手動実行(workflow_dispatch)できます。
on:
  workflow_dispatch:          # 手動実行のみ(定期実行は停止)

jobs:
  notify:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Detect notify mode
        id: mode
        run: |
          # UTC時刻とdow(曜日: 0=日, 1=月...6=土)からモードを自動判定
          HOUR=$(date -u +%H)
          DOW=$(date -u +%w)   # 0=Sun, 1=Mon, ... 6=Sat
          MIN=$(date -u +%M)

          if [ "$DOW" = "5" ] && [ "$HOUR" = "23" ]; then
            echo "mode=weekend_sat" >> $GITHUB_OUTPUT
          elif [ "$DOW" = "6" ] && [ "$HOUR" = "23" ]; then
            echo "mode=weekend_sun" >> $GITHUB_OUTPUT
          elif [ "$HOUR" = "22" ]; then
            echo "mode=morning" >> $GITHUB_OUTPUT
          elif [ "$HOUR" = "3" ]; then
            echo "mode=noon" >> $GITHUB_OUTPUT
          elif [ "$HOUR" = "11" ]; then
            echo "mode=evening" >> $GITHUB_OUTPUT
          else
            echo "mode=morning" >> $GITHUB_OUTPUT
          fi
          echo "Detected mode: $(cat $GITHUB_OUTPUT | grep mode= | tail -1)"

      - name: Run notification
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          NOTIFY_MODE: ${{ steps.mode.outputs.mode }}
        run: |
          if [[ "$NOTIFY_MODE" == weekend_* ]]; then
            python notify_weekend.py
          else
            python notify_daily.py
          fi
